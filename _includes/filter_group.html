{% if include.color %}
  {% assign _color_rgb = site.data.colors[include.color] %}
{% endif %}
{% if include.brush_colour %}
  {% assign _brush_colour = include.brush_colour %}
{% endif %}

<div class="category {{ include.group_class }}">
  <div class="category-label-row">
    <span class="category-label" style="position:relative;padding:0.22rem 1rem 0.22rem 1rem;{% if _color_rgb %} --highlighter-fill: rgb({{ _color_rgb }});{% endif %}">
      {% if _brush_colour %}
        <span class="watercolour-brush-slot" aria-hidden="true" data-brush-colour="{{ _brush_colour }}"></span>
      {% endif %}
      {{ include.label }}
    </span>
    <span class="btn-clear-inline" style="display:none;">× clear</span>
  </div>
  <div class="category-buttons">
    {% for item in include.items %}
      <button type="button" class="{{ include.btn_class }}" {{ include.data_attr }}="{{ item }}">{{ item }}</button>
    {% endfor %}
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <meta name="base-url" content="{{ '/' | relative_url }}">
</head>
<body>

  <header class="site-header">
  <a href="{{ '/' | relative_url }}" class="site-title-link">
    <h1 class="highlighted">
      <div class="logo-header">
        {% include heading_with_highlighter.html %}
        {{ site.title }}
      </div>
    </h1>
  </a>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer-hearts" aria-hidden="true"></div>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>


  <script src="{{ '/assets/js/colours.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/highlighter.js' | relative_url }}"></script>
  <script>
  (function () {
    // ── Site footer hearts ──────────────────────────────────────────────────
    var heartEl = document.querySelector('.site-footer-hearts');
    if (heartEl) {
      var C = window.SITE_COLOURS;
      heartEl.innerHTML = '<svg viewBox="0 0 721.93781 183.80363" xmlns="http://www.w3.org/2000/svg" '
        + 'preserveAspectRatio="xMidYMid meet" aria-hidden="true">'

        + '</g></svg>';
    }

    // ── Index page category label doodles ───────────────────────────────────
    // Each [data-index-doodle] span gets an SVG fetched from assets/img/doodles/
    // and recoloured to the value in data-doodle-color.
    var baseUrl = document.querySelector('meta[name="base-url"]');
    var base = baseUrl ? baseUrl.getAttribute('content').replace(/\/$/, '') : '';

    var cache = {};
    document.querySelectorAll('[data-index-doodle]').forEach(function(el) {
      var name  = el.getAttribute('data-index-doodle');
      var color = el.getAttribute('data-doodle-color');
      var url   = base + '/assets/img/doodles/' + name + '.svg';

      function injectInto(span, svgText) {
        var c = span.getAttribute('data-doodle-color');
        var coloured = svgText.replace(/fill="black"/g, 'fill="' + c + '"');
        span.innerHTML = coloured;
      }

      if (cache[name]) {
        injectInto(el, cache[name]);
      } else {
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(text) {
            cache[name] = text;
            document.querySelectorAll('[data-index-doodle="' + name + '"]').forEach(function(span) {
              injectInto(span, text);
            });
          });
      }
    });
  })();
  </script>

</body>
</html>
